<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal Date Formatter</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
    
    
    <div class="container">
        <h2>Universal Date Formatter</h2>
  
<input type="text" id="inputDate" placeholder="Enter Input">


<select id="outputFormat">
  <option value="">Select Output Format</option>  
    <option value= "en-GB">DD/MM/YYYY</option>
    <option value= "dash">DD-MM-YYYY</option>
     <option value= "en-US">MM/DD/YYYY</option>
      <option value= "iso">YYYY-MM-DD</option>
       <option value= "longUS">Month Date Year</option>
        <option value= "longGB">Date Month Year</option>
</select>
<button onclick="convertDate()">Convert</button>
<div class="result-box">
    <h3>Converted Date </h3>
    <p id="result">--</p>
</div>
<div class="result-box">
    <h3>Current Date</h3>
    <p id="currentDate">--</p>
</div>
</div>
    <script src="script.js"></script>
</body>
</html>
